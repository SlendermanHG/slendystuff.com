<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Church Live | slendystuff</title>
  <meta name="description" content="Live pull of rwcov.org with quick return to slendystuff.">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <link rel="canonical" href="https://slendystuff.com/church.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="My Church Live | slendystuff">
  <meta property="og:description" content="Direct live pull of rwcov.org with quick access to giving and prayer requests.">
  <meta property="og:url" content="https://slendystuff.com/church.html">
  <meta property="og:site_name" content="slendystuff">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="church-live-shell">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="church-live-bar">
    <div class="church-live-actions">
      <a class="church-live-btn church-live-btn-primary" href="/">Return to slendystuff</a>
      <a class="church-live-btn" data-rwc-home href="https://rwcov.org/" target="_blank" rel="noopener">Open rwcov.org</a>
      <a class="church-live-btn" data-rwc-giving href="https://rwcov.org/giving/" target="_blank" rel="noopener">Giving</a>
      <a class="church-live-btn" data-rwc-prayer href="https://rwcov.org/prayer-requests/" target="_blank" rel="noopener">Prayer Requests</a>
      <a class="church-live-btn" data-rwc-contact href="https://rwcov.org/contact/" target="_blank" rel="noopener">Contact</a>
      <span class="church-live-status" data-rwc-status>Loading live church site...</span>
    </div>
  </header>

  <main id="main" class="church-live-main">
    <iframe
      class="church-live-frame"
      data-rwc-frame
      title="Relevant Worship Center live site"
      src="https://rwcov.org/"
      loading="eager"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
    <noscript>
      <p class="church-live-noscript">
        JavaScript is disabled. Open the church site directly:
        <a href="https://rwcov.org/" target="_blank" rel="noopener">rwcov.org</a>.
      </p>
    </noscript>
  </main>

  <script src="/shared.js"></script>
  <script src="/church.js"></script>
</body>
</html>
